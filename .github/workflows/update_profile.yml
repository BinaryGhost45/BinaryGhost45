name: Update Profile Greeting

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:      
  push:
    branches:
      - main              

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Run script
        run: python engine.py

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update profile data" && git push)
